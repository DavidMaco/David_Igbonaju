- id: procurement-intelligence-engine
  title: "PVIS: Procurement Volatility Intelligence System"
  tagline: "Procurement analytics platform combining regime-weighted Monte Carlo FX simulation, composite supplier risk scoring, and working capital optimization."
  domain: "Procurement Analytics"
  icon: "📊"
  color: "#00A86B"
  problem_statement: >
    Manufacturing procurement teams face three critical blind spots: FX volatility
    (a 15% NGN devaluation can wipe out ₦180M+ in margin), supplier risk (late
    deliveries cascade into production stoppages), and cash leakage (cost variances
    against standard costs go undetected across 1,000+ PO lines).
  solution_summary: >
    PVIS implements regime-weighted Monte Carlo FX simulation (10K–50K paths over
    up to 1,095 trading days) with live dual-API FX failover, a 6-factor composite
    supplier risk scoring model, cost leakage detection, and CCC optimization.
    Surfaced through an 8-page interactive Streamlit dashboard with full demo mode
    and a Power BI decision layer.
  business_impact:
    - "Regime-weighted Monte Carlo simulation with 10K–50K GBM paths, P5/P50/P95 bands, VaR/CVaR"
    - "6-factor composite supplier risk scoring (OTD, defects, cost variance, FX sensitivity, lead-time, geographic)"
    - "Live FX monitoring for 150+ currencies with dual-API failover"
    - "Cost leakage detection via unit-price vs. standard-cost variance by category"
    - "Cash Conversion Cycle optimization with DIO/DPO modeling"
  architecture_summary: >
    Three-tier architecture: ingestion layer (live FX APIs, CSV upload, 3-year seed
    generator) feeding a 19-table MySQL OLTP store and star-schema warehouse,
    processed by an analytics engine (Monte Carlo FX, composite risk, spend
    aggregation, working capital KPIs), presented in an 8-page Streamlit dashboard
    with Plotly charts and a Power BI semantic SQL view layer.
  stack:
    - Python 3.13+
    - MySQL 8.0
    - Aiven MySQL (Cloud)
    - Streamlit 1.54
    - SQLAlchemy + PyMySQL
    - NumPy / pandas
    - Plotly
    - Docker / Docker Compose
    - GitHub Actions CI/CD
  key_features:
    - "Live demo on Streamlit Cloud with Aiven MySQL. All 8 pages are fully interactive"
    - "Regime-weighted Monte Carlo with configurable horizon (30–1,095 days)"
    - "Auto-generated per-supplier negotiation action playbooks"
    - "Interactive company data upload with full pipeline re-run"
    - "Demo Mode operates with full functionality without database"
  status: "Production-Ready"
  highlights:
    pages: "8"
    tables: "19"
    fx_currencies: "150+"
    monte_carlo_paths: "50K"
  repo_url: "https://github.com/DavidMaco/pvis"
  demo_url: "https://davidmaco-pvis.streamlit.app/"
  dashboard_pages:
    - page: "FX Volatility Dashboard"
      icon: "💱"
      description: "Regime-weighted Monte Carlo with 50K GBM paths, live FX monitoring for 150+ currencies, configurable horizon, and P5/P50/P95 exposure bands."
      key_metrics: ["P95 FX Exposure", "VaR (95%)", "Regime Weight", "Live Rate"]
    - page: "Supplier Risk Matrix"
      icon: "⚠️"
