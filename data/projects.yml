    30+ table OLTP layer, then through star-schema ETL (SCD Type 2) into a dimensional
    warehouse, consumed by 16 analytics engines. Results surface via a 12-page Streamlit
    dashboard, 27-endpoint FastAPI REST API, and Power BI semantic views.
