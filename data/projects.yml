    FX exposure, ESG compliance, and cost leakage across global supply chains.
    Decisions are made on incomplete data spread across siloed ERPs, spreadsheets,
    and manual reports.
  solution_summary: >
    AEGIS integrates 16 analytics engines, including Monte Carlo simulation,
    MCDA supplier scoring (TOPSIS, PROMETHEE-II), game-theoretic negotiation,
    digital-twin supply-chain simulation, and NLP spend classification, over a
    normalized 40+ table MySQL schema with star-schema warehouse ETL, surfaced
    through a 12-page Streamlit dashboard and a 27-endpoint FastAPI REST API
