- id: supply-chain-disruption-predictor
  title: "Supply Chain Disruption Predictor"
  tagline: "Machine learning early warning system that forecasts delivery delays and scores supplier risk for FMCG manufacturing."
  domain: "Supply Chain / Predictive Analytics"
  icon: "🔮"
  color: "#DC2626"
  problem_statement: >
    Traditional procurement systems are reactive. They detect problems only after
    delays occur. Production stoppages cost up to 5M NGN per day, rush-order premiums add
    30 to 50 percent, and inventory imbalances cascade without advance warning.
  solution_summary: >
    A predictive analytics pipeline using Random Forest classification on 18
    engineered features combining supplier health metrics, daily external risk
    factors (rainfall, fuel, FX, port congestion), and operational signals.
    Produces per-order late-delivery probabilities, supplier risk scorecards,
    and scenario-based business impact estimates.
  business_impact:
    - "Model accuracy: 54.5%, Recall (Late): 63.2%, ROC-AUC: 0.540"
    - "Scenario-based savings estimate: ₦36.8M potential (70% mitigation on ₦875.2M exposed value)"
    - "Risk classification: Low (<30%), Medium (30–60%), High (>60%) tiers"
    - "18 engineered features including rolling averages and composite risk"
  architecture_summary: >
    Two-stage pipeline: data generation produces date-aligned external risk factors
    and supplier health metrics, which are joined and feature-engineered into an
    18-feature ML-ready dataset. ML training pipeline performs 80/20 split, trains
    balanced Random Forest, and outputs predictions, scorecards, and impact estimates.
    All artifacts are SHA-256 fingerprinted.
  stack:
    - Python 3.10+
    - scikit-learn
    - pandas / NumPy
    - PyYAML
    - joblib
    - pytest (15 tests)
    - GitHub Actions CI
  key_features:
    - "18 engineered features (rolling averages, late delivery rates, composite risk)"
    - "Claim validation system mapping every README figure to artifact evidence"
    - "SHA-256 reproducibility fingerprints for full traceability"
    - "Configurable assumptions via single config.yaml"
    - "Multi-version CI matrix (Python 3.10, 3.11, 3.12)"
  status: "MVP"
  highlights:
    features: "18"
    tests: "15"
    roc_auc: "0.540"
  repo_url: "https://github.com/DavidMaco/Supplychain_Disruption_Predictor"
  demo_url: ""
  dashboard_pages:
    - page: "Late Delivery Risk Forecast"
      icon: "🔮"
      description: "Per-order late-delivery probability scores using 18 engineered features. Risk tier classification (Low/Medium/High) with decision thresholds at 30% and 60%."
      key_metrics: ["Delay Probability", "Risk Tier", "ROC-AUC: 0.54", "Recall (Late): 63%"]
    - page: "Supplier Risk Scorecards"
